name: Build Image

# Triggered on push to main branch (when merging PR)
# Builds Docker image and pushes to private registry

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: docker-repo.spc.int/pdh-repo/ckan-mcp-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.SPC_DOCKER_REGISTRY_HOST }}
          username: ${{ secrets.SPC_DOCKER_REGISTRY_PDH_USER }}
          password: ${{ secrets.SPC_DOCKER_REGISTRY_PDH_SECRET }}

      - name: Set date as env variable
        run: echo "DATE_TAG=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: "${{ env.IMAGE_NAME }}:${{ env.DATE_TAG }},${{ env.IMAGE_NAME }}:latest"
          build-args: |
            TAG_VERSION=${{ env.DATE_TAG }}
